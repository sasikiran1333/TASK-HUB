<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TASKHUB SIGNUP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">



<style>

/* Slide Button CSS */

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 24px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "👉";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
 
  border-radius: 50%;
  transition: .4s;
}

input:checked + .slider {
  background-color:red;
}

input:checked + .slider:before {
  transform: translateX(26px);
}

</style>

</head>

<body class="sign-in">

<form class="container" action="sign-in2.html">


<!-- Slide Button Added -->
<p>Accept Terms & Conditions</p>

<label class="switch">
  <input type="checkbox" required>
  <span class="slider"></span>
</label>

<br><br>

<button type="submit">SEND OTP</button>

</form>

</body>
</html>
