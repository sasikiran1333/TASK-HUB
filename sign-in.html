<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TASKHUB SIGNUP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body class="sign-in">

<form class="container" action="sign-in2.html" onsubmit="return verifyCaptcha()"> 

<h1>TASKHUB</h1>


<input type="email" name="email" placeholder="email" required>
<br>

<label>Gender:</label><br>

<span><input type="radio" name="gender" value="male" required> Male</span>
<span><input type="radio" name="gender" value="Female" required> Female</span>
<span><input type="radio" name="gender" value="Other" required> Other</span><br>

<h3>Select Date of Birth:</h3>
<input type="date" id="dob" placeholder="DD-MM-YYYY" required><br>
<h4>Captcha Verification</h4>

<canvas id="captcha" width="150" height="40"></canvas>

<br>
<a href="#" onclick="generateCaptcha()">Refresh</a>

<input type="text" id="captchaInput" placeholder="Enter captcha" required>

<br>

<a href="#">Verify</a>


<button type="submit">NEXT</button>
<script src="script.js"></script>
</form>
</body>
</html>
